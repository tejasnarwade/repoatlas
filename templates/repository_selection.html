{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" href="{% static 'assets/img/apple-touch-icon.png' %}">
  <title>Select Repository - RepoAtlas</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,600,700,800" rel="stylesheet" />
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link href="{% static '/assets/css/nucleo-icons.css' %}" rel="stylesheet" />
  <link href="{% static 'assets/css/blk-design-system.css' %}?v=1.0.0" rel="stylesheet" />
  <link href="{% static '/assets/demo/demo.css' %}" rel="stylesheet" />
</head>
<body class="register-page">
  <nav class="navbar navbar-expand-lg fixed-top navbar-transparent" color-on-scroll="100">
    <div class="container">
      <div class="navbar-translate">
        <a class="navbar-brand" href="/">Repo<span>Atlas</span></a>
      </div>
      <div class="collapse navbar-collapse justify-content-end" id="navigation">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/gemini">RepoAtlas</a></li>
          <li class="nav-item"><a class="nav-link btn btn-default d-none d-lg-block" href="/substack">Sign Up</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="wrapper">
    <div class="page-header">
      <div class="page-header-image"></div>
      <div class="content">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
              <div class="card card-register">
                <div class="card-header">
                  <img class="card-img" src="{% static 'assets/img/square1.png' %}" alt="Card image">
                  <h4 class="card-title">Select Repository</h4>
                </div>
                <div class="card-body">
                  <p class="text-white text-center">Enter a GitHub username to fetch and document their repositories.</p>
                  <form method="POST" action="{% url 'generate_pdf1' %}">
                    {% csrf_token %}
                    <div class="form-group">
                      <label class="text-white">GitHub Username</label>
                      <input type="text" name="username" class="form-control" placeholder="e.g. RepoAtlas" required>
                    </div>
                    <div class="form-group">
                      <label class="text-white">Repository URL</label>
                      <input type="text" name="selected_repo" class="form-control" placeholder="e.g. https://api.github.com/repos/RepoAtlas/codeai" required>
                      <small class="text-muted">Format: https://api.github.com/repos/username/repo-name</small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-round btn-block">Generate Documentation</button>
                  </form>
                </div>
                <div class="card-footer text-center">
                  <a href="/" class="btn btn-default btn-round">Back to Home</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{% static '/assets/js/core/jquery.min.js' %}" type="text/javascript"></script>
  <script src="{% static '/assets/js/core/popper.min.js' %}" type="text/javascript"></script>
  <script src="{% static '/assets/js/core/bootstrap.min.js' %}" type="text/javascript"></script>
  <script src="{% static '/assets/js/blk-design-system.min.js?v=1.0.0' %}" type="text/javascript"></script>
</body>
</html>
